<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Administração</title><link rel="stylesheet" href="/static/styles.css"></head><body><main class="page-shell access-shell"><section class="hero"><p class="eyebrow">Administração</p><h1>Gestão da barbearia.</h1></section><section class="booking-card"><h2>Entrar como master</h2><form id="admin-login"><label>Usuário<input id="usuario" autocomplete="username" required></label><label class="full-field">Senha<input id="senha" type="password" autocomplete="current-password" required></label><button>Entrar</button><p id="feedback" class="feedback"></p></form></section></main><script>document.querySelector('#admin-login').onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:usuario.value.trim(),senha:senha.value})});if(r.ok)location.href='/admin';else feedback.textContent=(await r.json()).detail;};</script></body></html>

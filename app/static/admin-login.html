<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0b0b0c"><title>Administração — Barbearia</title><link rel="stylesheet" href="/static/styles.css"></head><body><a class="skip-link" href="#conteudo">Ir para o conteúdo</a><main class="page-shell access-shell" id="conteudo"><section class="hero"><p class="eyebrow">Administração</p><h1>Gestão da barbearia.</h1><p class="subtitle">Acesso reservado para a equipe responsável pela operação.</p></section><section class="booking-card" aria-labelledby="admin-login-title"><div class="card-heading"><span aria-hidden="true">BB</span><div><p class="eyebrow">Acesso seguro</p><h2 id="admin-login-title">Entrar como master</h2></div></div><form id="admin-login"><label>Usuário<input id="usuario" autocomplete="username" required></label><label class="full-field">Senha<input id="senha" type="password" autocomplete="current-password" required></label><button>Entrar</button><p id="feedback" class="feedback" role="alert" aria-live="polite"></p></form></section></main><script>document.querySelector('#admin-login').onsubmit=async e=>{e.preventDefault();const botao=e.currentTarget.querySelector('button');botao.disabled=true;const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:usuario.value.trim(),senha:senha.value})});if(r.ok)location.href='/admin';else{feedback.textContent=(await r.json()).detail;feedback.className='feedback error';botao.disabled=false;}};</script></body></html>

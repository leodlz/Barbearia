<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Acesso do cliente</title><link rel="stylesheet" href="/static/styles.css"></head><body><main class="page-shell access-shell"><section class="hero"><p class="eyebrow">Área do cliente</p><h1>Agende em poucos passos.</h1><p class="subtitle">Seus dados serão usados apenas para identificação e gerenciamento do agendamento.</p></section><section class="booking-card"><h2>Identifique-se</h2><form id="access-form" novalidate><label>Nome completo<input id="nome" autocomplete="name" minlength="3" required></label><label class="full-field">Telefone<input id="telefone" inputmode="tel" autocomplete="tel" placeholder="(48) 99999-9999" required></label><label class="full-field">CPF<input id="cpf" inputmode="numeric" autocomplete="off" placeholder="000.000.000-00" required></label><button id="entrar" type="submit">Continuar</button><p id="feedback" class="feedback" role="alert"></p></form></section></main><script src="/static/acesso.js" defer></script></body></html>

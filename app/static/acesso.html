<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Entrar — Barbearia</title><link rel="stylesheet" href="/static/styles.css"></head><body><main class="page-shell access-shell"><section class="hero"><p class="eyebrow">Área do cliente</p><h1>Seu horário, do seu jeito.</h1><p class="subtitle">Entre para agendar. Seu CPF é usado como usuário e não será exibido publicamente.</p></section><section class="booking-card"><div class="auth-tabs" role="tablist"><button id="tab-login" type="button" class="auth-tab active">Entrar</button><button id="tab-register" type="button" class="auth-tab">Registrar-se</button></div><form id="login-form" novalidate><label>CPF<input id="login-cpf" inputmode="numeric" autocomplete="username" placeholder="000.000.000-00" required></label><label class="full-field">Senha<input id="login-senha" type="password" autocomplete="current-password" required></label><button type="submit">Entrar</button></form><form id="register-form" class="hidden" novalidate><label>Nome completo<input id="nome" autocomplete="name" minlength="3" required></label><label class="full-field">Telefone<input id="telefone" inputmode="tel" autocomplete="tel" placeholder="(48) 99999-9999" required></label><label class="full-field">CPF<input id="registro-cpf" inputmode="numeric" autocomplete="username" placeholder="000.000.000-00" required></label><label class="full-field">Senha<input id="registro-senha" type="password" autocomplete="new-password" minlength="8" maxlength="128" required><small>Use pelo menos 8 caracteres.</small></label><button type="submit">Criar conta</button></form><p id="feedback" class="feedback" role="alert" aria-live="polite"></p></section></main><script src="/static/acesso.js" defer></script></body></html>
